---
- hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yaml

  tasks:
    - name: Check if kubeconfig file exists
      stat:
        path: "{{ kubeconfig_file }}"
      register: kubeconfig_file_stat

    - name: Fail if kubeconfig file does not exist
      fail:
        msg: "kubeconfig file '{{ kubeconfig_file }}' does not exist."
      when: not kubeconfig_file_stat.stat.exists

    - name: Download clusterctl binary
      ansible.builtin.get_url:
        url: https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.13.3/clusterctl-linux-amd64
        dest: "{{ playbook_dir }}/clusterctl"
        mode: '0755'

    - name: Run clusterctl init with rancher-fleet addon
      ansible.builtin.command:
        cmd: ./clusterctl init --addon rancher-fleet
        chdir: "{{ playbook_dir }}"
      environment:
        KUBECONFIG: "{{ kubeconfig_file }}"

    - name: Fetch cert-manager manifest
      ansible.builtin.uri:
        url: https://github.com/jetstack/cert-manager/releases/latest/download/cert-manager.yaml
        method: GET
        return_content: true
        body_format: raw
      register: cert_manager_manifest

    - name: Apply cert-manager
      kubernetes.core.k8s:
        state: present
        resource_definition: "{{ cert_manager_manifest.content }}"
        kubeconfig: "{{ kubeconfig_file }}"

    - name: Add capi-operator helm repo
      kubernetes.core.helm_repository:
        name: capi-operator
        repo_url: https://kubernetes-sigs.github.io/cluster-api-operator

    - name: Install capi-operator with rancher-fleet addon enabled
      kubernetes.core.helm:
        name: capi-operator
        chart_ref: capi-operator/cluster-api-operator
        release_namespace: capi-operator-system
        create_namespace: true
        update_repo_cache: true
        kubeconfig: "{{ kubeconfig_file }}"
        values:
          addon:
            rancher-fleet:
              enabled: true
      ignore_errors: true

    - name: Apply CAPI providers
      kubernetes.core.k8s:
        namespace: default
        state: present
        src: "{{ capiconfig_file }}"
        kubeconfig: "{{ kubeconfig_file }}"
      register: capi_provider_result
      retries: 5
      delay: 30
      until: capi_provider_result is succeeded
    
    - name: Fetch clusterclass
      ansible.builtin.uri:
        url: "{{ clusterclass_url }}"
        method: GET
        return_content: true
        body_format: raw
      register: clusterclass
      when: clusterclass_url is defined and clusterclass_url != ''

    - name: Apply cluster class
      kubernetes.core.k8s:
        namespace: default
        state: present
        resource_definition: "{{ clusterclass.content }}"
        kubeconfig: "{{ kubeconfig_file }}"
      when: clusterclass_url is defined and clusterclass_url != ''

    - name: Apply CAPI cluster
      kubernetes.core.k8s:
        namespace: default
        state: present
        src: "{{ capiclusterconfig_file }}"
        kubeconfig: "{{ kubeconfig_file }}"

    - name: List CAPI MachineDeployments
      kubernetes.core.k8s_info:
        api_version: cluster.x-k8s.io/v1beta1
        kind: MachineDeployment
        namespace: default
        kubeconfig: "{{ kubeconfig_file }}"
      register: capi_machinedeployments

    - name: Resolve MachineDeployment name matching capi_pool_name
      ansible.builtin.set_fact:
        capi_machinedeployment_name: "{{ capi_machinedeployments.resources | selectattr('metadata.name', 'search', capi_pool_name) | map(attribute='metadata.name') | first }}"

    - name: Wait for CAPI cluster be ready
      kubernetes.core.k8s_info:
        api_version: cluster.x-k8s.io/v1beta1
        kind: MachineDeployment
        name: "{{ capi_machinedeployment_name }}"
        namespace: default
        kubeconfig: "{{ kubeconfig_file }}"
        wait: yes
        wait_timeout: 1800
        wait_condition:
          type: Ready