---
- name: Add Rancher Helm repository for upgrade target
  kubernetes.core.helm_repository:
    kubeconfig: "{{ kubeconfig_file }}"
    name: "{{ rancher_chart_repo_upgrade }}"
    repo_url: "{{ rancher_chart_upgrade_repo_url }}"

- name: Install helm-diff plugin (required by kubernetes.core.helm reuse_values)
  ansible.builtin.command: helm plugin install https://github.com/databus23/helm-diff --version v{{ helm_diff_version | default('3.9.12') }}
  register: helm_diff_result
  failed_when: helm_diff_result.rc != 0 and 'already installed' not in helm_diff_result.stderr

- name: Upgrade Rancher in-place (verify signed chart)
  block:
    - name: Upgrade Rancher with chart verification
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_file }}"
        name: rancher
        chart_ref: "{{ rancher_chart_repo_upgrade }}/rancher"
        release_namespace: cattle-system
        chart_version: "{{ '' if rancher_version_upgrade == 'latest' else rancher_version_upgrade }}"
        reuse_values: true
        wait: true
        wait_timeout: "800s"
        values:
          rancherImageTag: "{{ 'head' if (rancher_image_tag_upgrade | default('')) == 'latest' else rancher_image_tag_upgrade | default(omit) }}"
        verify: true
  rescue:
    - name: Warn about unsigned Rancher upgrade chart
      ansible.builtin.debug:
        msg: "WARNING: Rancher upgrade chart has no signed provenance file. Installing without verification."

    - name: Upgrade Rancher (unsigned fallback)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_file }}"
        name: rancher
        chart_ref: "{{ rancher_chart_repo_upgrade }}/rancher"
        release_namespace: cattle-system
        chart_version: "{{ '' if rancher_version_upgrade == 'latest' else rancher_version_upgrade }}"
        reuse_values: true
        wait: true
        wait_timeout: "800s"
        values:
          rancherImageTag: "{{ 'head' if (rancher_image_tag_upgrade | default('')) == 'latest' else rancher_image_tag_upgrade | default(omit) }}"
  retries: 6
  delay: 120
  # reuse_values preserves all values from the current release (hostname, replicas, etc.)
  # so only the chart version and rancherImageTag are changed.
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_file }}"
    name: rancher
    chart_ref: "{{ rancher_chart_repo_upgrade }}/rancher"
    release_namespace: cattle-system
    chart_version: "{{ '' if rancher_version_upgrade == 'latest' else rancher_version_upgrade }}"
    reuse_values: true
    wait: true
    wait_timeout: "800s"
    values:
      rancherImageTag: "{{ 'head' if (rancher_image_tag_upgrade | default('')) == 'latest' else rancher_image_tag_upgrade | default(omit) }}"
  retries: 6
  delay: 120

- name: Wait for Rancher deployment to be ready after upgrade
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_file }}"
    api_version: apps/v1
    kind: Deployment
    namespace: cattle-system
    name: rancher
  register: rancher_deploy_info
  retries: 12
  delay: 300
  until: >
    rancher_deploy_info.resources | default([]) | length > 0 and
    (rancher_deploy_info.resources[0].status.readyReplicas | default(0)) > 0 and
    (rancher_deploy_info.resources[0].status.readyReplicas | default(0)) ==
    (rancher_deploy_info.resources[0].status.replicas | default(1))

- name: Wait for Rancher UI to respond after upgrade
  ansible.builtin.uri:
    url: "https://{{ fqdn }}"
    method: GET
    validate_certs: false
  register: webpage_result_upgrade
  retries: 15
  delay: 120
  until: webpage_result_upgrade.status is defined and webpage_result_upgrade.status == 200

# The bootstrap password is no longer valid after the initial install changed it,
# so authenticate with the permanent password to get a fresh API token.
- name: Get Rancher Token after upgrade
  ansible.builtin.uri:
    url: "https://{{ fqdn }}/v3-public/localproviders/local?action=login"
    body:
      username: admin
      password: "{{ password }}"
    method: POST
    force_basic_auth: true
    validate_certs: false
    status_code: 201
    body_format: json
  register: rancherjson
  retries: 5
  delay: 10
  until: rancherjson.status == 201

- name: Extract Rancher Token after upgrade
  ansible.builtin.set_fact:
    API_KEY: "{{ rancherjson.json.token }}"

- name: Write updated token to generated.tfvars
  ansible.builtin.copy:
    dest: generated.tfvars
    content: |
      fqdn = "https://{{ fqdn }}"
      api_key = "{{ API_KEY }}"