---
- name: Wait for downstream cluster to appear in fleet-default
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_file }}"
    api_version: provisioning.cattle.io/v1
    kind: Cluster
    namespace: fleet-default
  register: k8s_all_clusters
  until: >
    (k8s_all_clusters.resources
     | rejectattr('metadata.name', 'equalto', 'local')
     | list | length > 0)
  retries: 20
  delay: 30

- name: Resolve downstream cluster name (first non-local cluster)
  ansible.builtin.set_fact:
    k8s_downstream_cluster_name: >-
      {{ (k8s_all_clusters.resources
          | rejectattr('metadata.name', 'equalto', 'local')
          | list | first).metadata.name }}

- name: Upgrade downstream cluster kubernetesVersion
  kubernetes.core.k8s_json_patch:
    kubeconfig: "{{ kubeconfig_file }}"
    api_version: provisioning.cattle.io/v1
    kind: Cluster
    namespace: fleet-default
    name: "{{ k8s_downstream_cluster_name }}"
    patch:
      - op: replace
        path: /spec/kubernetesVersion
        value: "{{ kubernetes_version_upgrade }}"

- name: Wait for downstream cluster to finish k8s upgrade
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_file }}"
    api_version: provisioning.cattle.io/v1
    kind: Cluster
    namespace: fleet-default
    name: "{{ k8s_downstream_cluster_name }}"
    wait: yes
    wait_sleep: 60
    wait_timeout: 1800
    wait_condition:
      type: Ready
