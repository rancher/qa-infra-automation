---
- name: Add target cluster to Rancher
  hosts: localhost
  gather_facts: true
  vars:
    admin_password: "{{ rancher_bootstrap_password | default('admin') }}"
    repo_root: "{{ playbook_dir | regex_replace('(.*)/ansible/.*', '\\1') }}"
    fqdn: "{{ rancher_hostname | default(external_lb_hostname) }}"
    # Cluster name generation: <prefix>-<random suffix>
    # Precedence for the prefix (highest first): `downstream_cluster_name_prefix` (e.g. set in inventory/group_vars),
    # `DOWNSTREAM_CLUSTER_NAME_PREFIX` env, then the hardcoded 'ansible-created' below.
    # Suffix length: override via `downstream_cluster_name_suffix_length` (default 8).
    # Set DOWNSTREAM_CLUSTER_NAME (or `cluster_name`) to use a fully custom name instead.
    # NOTE: defined as `*_default` play vars (not the override names) so inventory/group_vars/host_vars
    # can override them — play-level `vars:` otherwise outrank inventory vars.
    downstream_cluster_name_prefix_default: "{{ lookup('env', 'DOWNSTREAM_CLUSTER_NAME_PREFIX') | default('ansible-created', true) }}"
    downstream_cluster_name_suffix_length_default: 8
  pre_tasks:
    - name: Validate rancher group exists
      ansible.builtin.assert:
        that:
          - groups['rancher'] is defined
          - groups['rancher'] | length > 0
        fail_msg: "The 'rancher' group must exist and contain at least one host"

    - name: Validate target is set
      ansible.builtin.assert:
        that:
          - groups[target] is defined
          - groups[target] | length > 0
        fail_msg: "The 'target' variable must be defined either on all.yml or via --extra-vars and point to an inventory group with at least one node"

  tasks:
    - name: Get Rancher UserID and Token
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/v3-public/localProviders/local?action=login"
        body:
          username: admin
          password: "{{ admin_password }}"
        method: POST
        force_basic_auth: true
        validate_certs: false
        status_code: 201
        body_format: json
      register: token_response
      retries: 5
      delay: 10
      until: token_response.status == 201

    - name: Get cluster name from explicit variable or environment
      ansible.builtin.set_fact:
        cluster_name: "{{ cluster_name | default(lookup('env', 'DOWNSTREAM_CLUSTER_NAME'), true) }}"

    - name: Generate cluster name as <prefix>-<random suffix> when not explicitly set
      ansible.builtin.set_fact:
        cluster_name: "{{ downstream_cluster_name_prefix | default(downstream_cluster_name_prefix_default) }}-{{ lookup('password', '/dev/null length=' ~ (downstream_cluster_name_suffix_length | default(downstream_cluster_name_suffix_length_default)) ~ ' chars=ascii_lowercase,digits') }}"
      when: cluster_name | default('', true) | length == 0

    - name: Display generated cluster name
      ansible.builtin.debug:
        msg: "Downstream cluster name: {{ cluster_name }}"

    # Register the cluster via the Rancher v3 API instead of the rancher2 Terraform/OpenTofu
    # provider. The provider's `rancher2_cluster` resource waits for the cluster to reach
    # `active`/`provisioning` on Create, but an *imported* cluster stays `pending` until the
    # cattle-cluster-agent connects — and the agent is applied later in this playbook
    # (second play, after this step returns). That ordering made the provider's create-waiter
    # retry every 10s for its 30m default timeout and never return (deadlock). The API
    # returns the cluster id and its registration token immediately, which is all this step
    # needs. This is also idempotent: it looks the cluster up by name first and only creates
    # it if absent (re-runs won't duplicate it).
    - name: Look up existing imported cluster by name (idempotency)
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/v3/clusters?name={{ cluster_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ token_response.json.token }}"
        validate_certs: false
        body_format: json
        status_code: 200
      register: existing_cluster_lookup
      changed_when: false

    - name: Create imported cluster if it does not already exist
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/v3/clusters"
        method: POST
        headers:
          Authorization: "Bearer {{ token_response.json.token }}"
        body_format: json
        body:
          type: cluster
          name: "{{ cluster_name }}"
          importedConfig:
            privateRegistryUrl: "{{ downstream_private_registry_url | default('') }}"
        validate_certs: false
        status_code: [200, 201]
      register: created_cluster
      when: existing_cluster_lookup.json.data | length == 0

    - name: Set cluster id fact
      ansible.builtin.set_fact:
        cluster_id: >-
          {{
            created_cluster.json.id
            if (created_cluster is not skipped)
            else existing_cluster_lookup.json.data[0].id
          }}

    - name: Fetch cluster registration token (available immediately at create time)
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/v3/clusterregistrationtokens?clusterId={{ cluster_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ token_response.json.token }}"
        validate_certs: false
        body_format: json
        status_code: 200
      register: registration_token_resp
      retries: 6
      delay: 5
      until: registration_token_resp.json.data | length > 0

    - name: Set useful facts
      ansible.builtin.set_fact:
        api_key: "{{ token_response.json.token }}"
        cluster_id: "{{ cluster_id }}"
        cluster_registration_token: "{{ registration_token_resp.json.data[0].token }}"

    # Optionally inject the downstream cluster name into cattle-config.yaml.
    # Mirrors generate-admin-token.yml's rancher_auth role, which writes
    # rancher.adminToken when rancher_cattle_config_file is set.
    - name: Update cattle-config.yaml with downstream cluster name
      when: rancher_cattle_config_file | default('') | length > 0
      block:
        - name: Check if cattle config file exists
          ansible.builtin.stat:
            path: "{{ rancher_cattle_config_file }}"
          register: cattle_config_stat

        - name: Fail if cattle config file doesn't exist
          ansible.builtin.fail:
            msg: "Cattle config file not found: {{ rancher_cattle_config_file }}"
          when: not cattle_config_stat.stat.exists

        - name: Read existing cattle config
          ansible.builtin.slurp:
            src: "{{ rancher_cattle_config_file }}"
          register: cattle_config_content

        - name: Parse cattle config YAML
          ansible.builtin.set_fact:
            cattle_config: "{{ cattle_config_content.content | b64decode | from_yaml }}"

        - name: Update cattle config with downstream cluster name
          ansible.builtin.set_fact:
            cattle_config_updated: >-
              {{ cattle_config | combine({
                'rancher': (cattle_config.rancher | default({})) | combine({
                  'clusterName': cluster_name
                })
              }, recursive=True) }}

        - name: Write updated cattle config
          ansible.builtin.copy:
            content: "{{ cattle_config_updated | to_nice_yaml(indent=2) }}"
            dest: "{{ rancher_cattle_config_file }}"
            mode: '0644'

        - name: Display cattle config update status
          ansible.builtin.debug:
            msg: "Updated {{ rancher_cattle_config_file }} with clusterName: {{ cluster_name }}"

- hosts: bastion
  gather_facts: true
  become: true
  vars:
    downstream: "{{ target | default('', true) }}"
    fqdn: "{{ rancher_hostname | default(internal_lb_hostname) }}"
  tasks:
    - name: Read KUBECONFIG content
      block:
        - name: Try reading rke2.yaml
          ansible.builtin.slurp:
            src: "/etc/rancher/rke2/rke2.yaml"
          register: kubeconfig_content
          delegate_to: "{{ groups[downstream][0] }}"
          become: true
      rescue:
        - name: RKE2 KUBECONFIG not found, trying K3s path
          ansible.builtin.debug:
            msg: "Failed to fetch rke2.yaml. Attempting to fetch k3s.yaml"

        - name: Try reading k3s.yaml
          ansible.builtin.slurp:
            src: "/etc/rancher/k3s/k3s.yaml"
          register: kubeconfig_content
          delegate_to: "{{ groups[downstream][0] }}"
          become: true

    - name: Write kubeconfig to bastion root
      ansible.builtin.copy:
        content: "{{ kubeconfig_content.content | b64decode }}"
        dest: "/tmp/kubeconfig-{{ downstream }}.yaml"
        mode: "0600"
        owner: "{{ ansible_user }}"

    - name: Update API server address in KUBECONFIG
      ansible.builtin.replace:
        path: "/tmp/kubeconfig-{{ downstream }}.yaml"
        regexp: "https://127\\.0\\.0\\.1:6443"
        replace: 'https://{{ hostvars[groups[downstream][0]]["ansible_host"] }}:6443'

    - name: Check if python3-pip is already installed
      ansible.builtin.command: python3 -m pip --version
      register: pip_check
      changed_when: false
      failed_when: false

    - name: Install pip3 if not present
      ansible.builtin.package:
        name: python3-pip
        state: present
        update_cache: true
      when: pip_check.rc != 0
      ignore_errors: true

    - name: Display pip installation status
      ansible.builtin.debug:
        msg: "Python3-pip installation: {{ 'Already installed' if pip_check.rc == 0 else 'Installation attempted (may have failed in airgap environment)' }}"

    - name: Install kubernetes Python packages
      ansible.builtin.package:
        name:
          - python3-kubernetes
        state: present
        update_cache: true

    - name: Download manifest to register into Rancher
      ansible.builtin.get_url:
        url: "https://{{ fqdn }}/v3/import/{{ hostvars['localhost']['cluster_registration_token'] }}_{{ hostvars['localhost']['cluster_id'] }}.yaml"
        dest: "/tmp/cluster_registration_manifest_{{ ansible_facts.date_time.iso8601 }}.yaml"
        mode: "0755"
        timeout: 60
        force: true
        validate_certs: false

    - name: Apply manifest to add cluster to Rancher
      kubernetes.core.k8s:
        state: present
        src: "/tmp/cluster_registration_manifest_{{ ansible_facts.date_time.iso8601 }}.yaml"
        kubeconfig: "/tmp/kubeconfig-{{ downstream }}.yaml"
        verify_ssl: false
      environment:
        RANCHER_INSECURE: true

    - name: Wait for agent deployment to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Deployment
        name: cattle-cluster-agent
        namespace: cattle-system
        wait: true
        wait_timeout: 300
        kubeconfig: "/tmp/kubeconfig-{{ downstream }}.yaml"
        wait_condition:
          type: Available
          status: "True"

    - name: Check if imported cluster is ready
      ansible.builtin.uri:
        url: "https://{{ fqdn }}/v3/clusters/{{ hostvars['localhost']['cluster_id'] }}"
        method: GET
        headers:
          Authorization: "Bearer {{ hostvars['localhost']['api_key'] }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        body_format: json
      register: cluster_check
      retries: 5
      delay: 30
      until: cluster_check.status == 200 and cluster_check.json.state == "active"
