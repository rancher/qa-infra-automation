---
- hosts: all
  name: Setup nodes - Python and NetworkManager
  become: true
  gather_facts: false
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      become: false
    - name: Gather facts
      ansible.builtin.setup:
    - name: Validate required variables
      assert:
        that:
          - kubernetes_version is defined
          - kubernetes_version | length > 0
          - kube_api_host is defined
          - kube_api_host | length > 0
          - cni is defined
          - cni | length > 0
        fail_msg: "Required variables not defined. Set kubernetes_version, kube_api_host, and cni in vars.yaml or inventory all.vars"
      run_once: true
  roles:
    - role: rke2_setup
      tags: ['setup', 'rke2']

- hosts: all
  name: Generate RKE2 configuration files
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  roles:
    - role: rke2_config
      vars:
        rke2_kubernetes_version: "{{ kubernetes_version }}"
        rke2_kube_api_host: "{{ kube_api_host }}"
        rke2_fqdn: "{{ fqdn | default(kube_api_host) }}"
        rke2_cni: "{{ cni }}"
        rke2_server_flags: "{{ server_flags | default('') }}"
        rke2_worker_flags: "{{ worker_flags | default('') }}"
      tags: ['config', 'rke2']

- hosts: all
  name: Install RKE2 binaries
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  roles:
    - role: rke2_install
      vars:
        rke2_version: "{{ kubernetes_version }}"
        rke2_channel: "{{ channel | default('stable') }}"
        rke2_install_method: "{{ install_method | default('online') }}"
      tags: ['install', 'rke2']

- hosts: all
  name: Form RKE2 cluster
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    node_token_file: "/tmp/node_token.txt"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  roles:
    - role: rke2_cluster
      vars:
        rke2_kube_api_host: "{{ kube_api_host }}"
        rke2_kubeconfig_dest: "{{ playbook_dir }}/kubeconfig.yaml"
        rke2_node_token_file: "{{ node_token_file }}"
      tags: ['cluster', 'rke2']

- hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yaml
  roles:
    - role: rke2_health_check
      vars:
        rke2_kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
        rke2_server_flags: "{{ server_flags | default('') }}"
      tags: ['health', 'rke2']
