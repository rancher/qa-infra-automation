---
- hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yaml
  vars:
    # terraform integration (optional).
    terraform_workspace: "{{ lookup('env', 'TF_WORKSPACE') | default('', true) }}"
    terraform_module_path: "{{ lookup('env', 'TERRAFORM_NODE_SOURCE') | default('tofu/aws/modules/cluster_nodes') }}"
    terraform_state_path: "{{ 'terraform.tfstate.d/' ~ terraform_workspace ~ '/terraform.tfstate' if terraform_workspace != '' and terraform_workspace != 'default' else 'terraform.tfstate' }}"
    terraform_state_file: "{{ playbook_dir | dirname | dirname | dirname }}/{{ terraform_module_path }}/{{ terraform_state_path }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  tasks:
    - name: Set variables based on tofu or environment
      when: kube_api_host is not defined or fqdn is not defined
      block:
      - name: Check if using tfstate file
        ansible.builtin.stat:
          path: "{{ terraform_state_file }}"
        register: tfstate_file_stat

      - name: Set fqdn and kube_api_host content from tfstate file if it exists
        ansible.builtin.set_fact:
          kube_api_host: "{{ lookup('cloud.terraform.tf_output', 'kube_api_host', state_file=terraform_state_file) }}"
          fqdn: "{{ lookup('cloud.terraform.tf_output', 'fqdn', state_file=terraform_state_file) }}"
          use_terraform: true
        when: tfstate_file_stat.stat.exists

      - name: Set kube_api_host content from env or vars when not using terraform
        ansible.builtin.set_fact:
          kube_api_host: "{{ lookup('env', 'KUBE_API_HOST') | default(kube_api_host if kube_api_host is defined else '', true) }}"
          use_terraform: false
        when: not tfstate_file_stat.stat.exists

      - name: Set fqdn content from env or vars when not using terraform
        ansible.builtin.set_fact:
          fqdn: "{{ lookup('env', 'FQDN') | default(fqdn if fqdn is defined else (kube_api_host if kube_api_host is defined else ''), true) }}"
        when: not tfstate_file_stat.stat.exists

    - name: Validate required variables
      assert:
        that:
          - kubernetes_version is defined
          - kubernetes_version | length > 0
          - kube_api_host is defined
          - kube_api_host | length > 0
          - cni is defined
          - cni | length > 0
        fail_msg: "Required variables not defined. Please ensure kubernetes_version, kube_api_host, and cni are set in vars.yaml or environment variables"

- hosts: all
  name: Setup nodes - RKE2 prerequisites
  become: true
  gather_facts: false
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      become: false
    - name: Gather facts
      ansible.builtin.setup:
    - name: Validate required variables
      assert:
        that:
          - kubernetes_version is defined
          - kubernetes_version | length > 0
          - kube_api_host is defined
          - kube_api_host | length > 0
          - cni is defined
          - cni | length > 0
        fail_msg: "Required variables not defined. Set kubernetes_version, kube_api_host, and cni in vars.yaml or inventory all.vars"
      run_once: true
  roles:
    - role: rke2_setup
      tags: ['setup', 'rke2']

- hosts: all
  name: Generate RKE2 configuration files
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  roles:
    - role: rke2_config
      tags: ['config', 'rke2']

- hosts: all
  name: Install RKE2 binaries
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  roles:
    - role: rke2_install
      vars:
        rke2_version: "{{ kubernetes_version }}"
        rke2_channel: "{{ channel | default('stable') }}"
        rke2_install_method: "{{ install_method | default('online') }}"
      tags: ['install', 'rke2']

- hosts: all
  name: Form RKE2 cluster
  become: true
  gather_facts: true
  vars_files:
    - vars.yaml
  vars:
    node_token_file: "/tmp/node_token.txt"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  pre_tasks:
    # Build the config RKE2 actually reads. DTF forwards SERVER_FLAGS through
    # rke2_additional_config, while manual users may set rke2_server_config or
    # rke2_agent_config directly, so the CIS checks must inspect both sources.
    - name: CIS | Resolve effective config
      set_fact:
        _rke2_is_server: "{{ rke2_node_role == 'master' or 'cp' in (node_roles | default([])) or 'etcd' in (node_roles | default([])) }}"
        _rke2_srv_eff: "{{ rke2_server_config | default({}) | combine(rke2_additional_config | default({})) }}"
        _rke2_agt_eff: "{{ rke2_agent_config | default({}) | combine(rke2_additional_config | default({})) }}"
      tags: ['cluster', 'rke2']

    # CIS needs sysctls wherever the effective profile is cis. Servers may also
    # need the etcd user for etcd settings. Repeat the CIS predicate because
    # set_fact does not expose sibling values within the same task.
    - name: CIS | Determine flags
      set_fact:
        rke2_needs_cis_sysctl: "{{ (_rke2_is_server and 'cis' in (_rke2_srv_eff.profile | default(''))) or (not _rke2_is_server and 'cis' in (_rke2_agt_eff.profile | default(''))) }}"
        rke2_needs_etcd_user: "{{ ((_rke2_is_server and 'cis' in (_rke2_srv_eff.profile | default(''))) or (not _rke2_is_server and 'cis' in (_rke2_agt_eff.profile | default('')))) or (_rke2_is_server and (_rke2_srv_eff | dict2items | selectattr('key', 'match', '^etcd') | list | length > 0)) }}"
      tags: ['cluster', 'rke2']

    - name: CIS | Ensure etcd group exists
      group: { name: etcd, system: true }
      when: rke2_needs_etcd_user
      tags: ['cluster', 'rke2']

    - name: CIS | Ensure etcd user exists
      user: { name: etcd, group: etcd, system: true, shell: /sbin/nologin, create_home: false }
      when: rke2_needs_etcd_user
      tags: ['cluster', 'rke2']

    # Pick the first shipped rke2-cis-sysctl.conf path. RPM-installed RHEL/SLES use
    # /usr/share/rke2/ or /usr/local/share/rke2/; tarball installs use /opt/rke2/share/rke2/.
    - name: CIS | Locate shipped rke2-cis-sysctl.conf
      stat:
        path: "{{ item }}"
      loop:
        - /usr/share/rke2/rke2-cis-sysctl.conf
        - /usr/local/share/rke2/rke2-cis-sysctl.conf
        - /opt/rke2/share/rke2/rke2-cis-sysctl.conf
      when: rke2_needs_cis_sysctl
      register: cis_sysctl_candidates
      tags: ['cluster', 'rke2']

    - name: CIS | Select shipped rke2-cis-sysctl.conf
      set_fact:
        cis_sysctl_source: >-
          {{ cis_sysctl_candidates.results | default([]) |
             selectattr('stat.exists') | map(attribute='item') | first | default('') }}
      when: rke2_needs_cis_sysctl
      tags: ['cluster', 'rke2']

    - name: CIS | Copy rke2-cis-sysctl.conf into /etc/sysctl.d
      copy:
        src: "{{ cis_sysctl_source }}"
        dest: /etc/sysctl.d/60-rke2-cis.conf
        remote_src: true
        mode: '0644'
      when:
        - rke2_needs_cis_sysctl
        - cis_sysctl_source | default('') | length > 0
      tags: ['cluster', 'rke2']

    # Fallback: write the rke2-cis sysctls inline if none of the shipped paths existed.
    # Covers SLE Micro and any image where rke2-common isn't laid down yet at preflight time.
    - name: CIS | Write inline sysctls (fallback when shipped file is absent)
      copy:
        dest: /etc/sysctl.d/60-rke2-cis.conf
        mode: '0644'
        content: |
          vm.panic_on_oom=0
          vm.overcommit_memory=1
          kernel.panic=10
          kernel.panic_on_oops=1
          kernel.keys.root_maxbytes=25000000
      when:
        - rke2_needs_cis_sysctl
        - cis_sysctl_source | default('') | length == 0
      tags: ['cluster', 'rke2']

    - name: CIS | Reload sysctls
      systemd: { name: systemd-sysctl, state: restarted }
      when: rke2_needs_cis_sysctl
      tags: ['cluster', 'rke2']

    # Fetch operator-provided files before rke2 starts (e.g. the custom PSA config that
    # lets Rancher run on profile: cis). optional_files is a space-separated list of
    # "dest,url[,sha256]" entries. Opt-in, so plain CIS runs keep RKE2's strict default PSA.
    - name: Optional files | Deliver operator-provided files
      when:
        - _rke2_is_server | default(false)
        - optional_files is defined
        - (optional_files | trim | length) > 0
      block:
        # Fail clearly on a malformed entry instead of an opaque index error, and
        # split on the first comma only so URLs containing commas stay intact.
        - name: Optional files | Validate "dest,url[,sha256]" format
          ansible.builtin.assert:
            that: "',' in item"
            fail_msg: "optional_files entry '{{ item }}' must be in 'dest,url[,sha256]' form"
            quiet: true
          loop: "{{ optional_files.split() }}"

        - name: Optional files | Ensure destination directories exist
          ansible.builtin.file:
            path: "{{ (item.split(',', 1)[0] | trim) | dirname }}"
            state: directory
            mode: '0755'
          loop: "{{ optional_files.split() }}"

        - name: Optional files | Fetch and verify files with SHA256 checksums
          ansible.builtin.include_role:
            name: download_verify
          vars:
            dv_artifact_url: "{{ item.split(',', 1)[1].rsplit(',', 1)[0] | trim }}"
            dv_dest: "{{ item.split(',', 1)[0] | trim }}"
            dv_checksum_format: sha256sum_inline
            dv_checksum_inline_value: "{{ item.rsplit(',', 1)[-1] | trim | lower }}"
            dv_mode: "0644"
          loop: "{{ optional_files.split() }}"
          when: (item.rsplit(',', 1)[-1] | trim) is match('^[0-9a-fA-F]{64}$')

        # Preserve the legacy pair format for existing DTF/Jenkins callers. New
        # callers should provide the third SHA256 field so download_verify is used.
        - name: Optional files | Fetch legacy entries without checksum
          ansible.builtin.get_url:
            url: "{{ item.split(',', 1)[1] | trim }}"
            dest: "{{ item.split(',', 1)[0] | trim }}"
            mode: '0644'
          loop: "{{ optional_files.split() }}"
          when: (item.rsplit(',', 1)[-1] | trim) is not match('^[0-9a-fA-F]{64}$')
      tags: ['cluster', 'rke2']

  roles:
    - role: rke2_cluster
      vars:
        rke2_kubeconfig_dest: "{{ playbook_dir }}/kubeconfig.yaml"
      tags: ['cluster', 'rke2']

- hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yaml
  roles:
    - role: rke2_health_check
      vars:
        rke2_kubeconfig_path: "{{ playbook_dir }}/kubeconfig.yaml"
        rke2_server_flags: "{{ server_flags | default('') }}"
        # External datastore (postgres/mysql/etc. via kine) has no local etcd pods — skip the etcd health check.
        # Substring-match the server_flags string; key-match the config dicts (avoids a value that merely contains the text).
        rke2_check_etcd_health: >-
          {{
            not (
              ('datastore-endpoint' in (server_flags | default(''))) or
              ('datastore-endpoint' in (rke2_server_config | default({}))) or
              ('datastore-endpoint' in (rke2_additional_config | default({})))
            )
          }}
      tags: ['health', 'rke2']
