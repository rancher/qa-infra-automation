---
# Verify RKE2 artifact checksums against upstream sha256sum file

- name: Verify RKE2 tarball checksum
  ansible.builtin.shell: |
    set -o pipefail
    cd {{ rke2_temp_dir }}
    expected=$(grep "rke2.linux-{{ rke2_arch }}.tar.gz" sha256sum-{{ rke2_arch }}.txt | awk '{print $1}')
    actual=$(sha256sum rke2.linux-{{ rke2_arch }}.tar.gz | awk '{print $1}')
    if [ "$actual" = "$expected" ]; then
      echo "OK"
      exit 0
    else
      echo "FAILED: Expected $expected, got $actual"
      exit 1
    fi
  register: tarball_checksum_verify
  changed_when: false
  become: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Verify RKE2 core images checksum
  ansible.builtin.shell: |
    set -o pipefail
    cd {{ rke2_temp_dir }}
    expected=$(grep "rke2-images-core.linux-{{ rke2_arch }}.tar.gz" sha256sum-{{ rke2_arch }}.txt | awk '{print $1}')
    actual=$(sha256sum rke2-images-core.tar.gz | awk '{print $1}')
    if [ "$actual" = "$expected" ]; then
      echo "OK"
      exit 0
    else
      echo "FAILED: Expected $expected, got $actual"
      exit 1
    fi
  register: core_images_checksum_verify
  changed_when: false
  become: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Verify RKE2 CNI images checksum
  ansible.builtin.shell: |
    set -o pipefail
    cd {{ rke2_temp_dir }}
    expected=$(grep "rke2-images-{{ cni | default('canal') }}.linux-{{ rke2_arch }}.tar.gz" sha256sum-{{ rke2_arch }}.txt | awk '{print $1}')
    actual=$(sha256sum rke2-images-cni.tar.gz | awk '{print $1}')
    if [ "$actual" = "$expected" ]; then
      echo "OK"
      exit 0
    else
      echo "FAILED: Expected $expected, got $actual"
      exit 1
    fi
  register: cni_images_checksum_verify
  changed_when: false
  become: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Verify RKE2 Traefik images checksum
  ansible.builtin.shell: |
    set -o pipefail
    cd {{ rke2_temp_dir }}
    expected=$(grep "rke2-images-traefik.linux-{{ rke2_arch }}.tar.gz" sha256sum-{{ rke2_arch }}.txt | awk '{print $1}')
    actual=$(sha256sum rke2-images-traefik.tar.gz | awk '{print $1}')
    if [ "$actual" = "$expected" ]; then
      echo "OK"
      exit 0
    else
      echo "FAILED: Expected $expected, got $actual"
      exit 1
    fi
  register: traefik_images_checksum_verify
  changed_when: false
  become: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Display checksum verification results
  ansible.builtin.debug:
    msg: |
      Checksum Verification Results:
      - RKE2 Tarball: {{ tarball_checksum_verify.stdout }}
      - Core Images: {{ core_images_checksum_verify.stdout }}
      - CNI Images: {{ cni_images_checksum_verify.stdout }}
      - Traefik Images: {{ traefik_images_checksum_verify.stdout }}

- name: Handle checksum verification failure
  when: >-
    tarball_checksum_verify.rc != 0 or
    core_images_checksum_verify.rc != 0 or
    cni_images_checksum_verify.rc != 0 or
    traefik_images_checksum_verify.rc != 0
  block:
    - name: Fail on checksum mismatch
      ansible.builtin.fail:
        msg: |
          Checksum verification failed! Files may be corrupted or tampered with.
          RKE2 Tarball: {{ tarball_checksum_verify.stdout }}
          Core Images: {{ core_images_checksum_verify.stdout }}
          CNI Images: {{ cni_images_checksum_verify.stdout }}
          Traefik Images: {{ traefik_images_checksum_verify.stdout }}

- name: Confirm successful verification
  ansible.builtin.debug:
    msg: "All checksums verified successfully"
  when: >-
    tarball_checksum_verify.rc == 0 and
    core_images_checksum_verify.rc == 0 and
    cni_images_checksum_verify.rc == 0 and
    traefik_images_checksum_verify.rc == 0
