---
# Main tasks for rke2_config role
# Configures RKE2 by generating config.yaml

- name: Display node configuration info
  ansible.builtin.debug:
    msg: "Configuring RKE2 on {{ inventory_hostname }} (Role: {{ rke2_node_role }}, Node roles: {{ node_roles }})"

- name: Ensure RKE2 config directory exists
  ansible.builtin.file:
    path: "{{ rke2_config_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Generate RKE2 config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ rke2_config_dir }}/config.yaml"
    mode: '0600'
    owner: root
    group: root
  become: true
  notify: restart rke2

- name: Ensure RKE2 config.yaml.d drop-in directory exists
  ansible.builtin.file:
    path: "{{ rke2_config_dir }}/config.yaml.d"
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

# RKE2 merges config.yaml.d/*.yaml with config.yaml; DTF report reads this drop-in to classify nodes.
- name: Generate RKE2 role_config.yaml drop-in
  ansible.builtin.template:
    src: role_config.yaml.j2
    dest: "{{ rke2_config_dir }}/config.yaml.d/role_config.yaml"
    mode: '0600'
    owner: root
    group: root
  become: true
  notify: restart rke2

- name: Display config file location
  ansible.builtin.debug:
    msg: "RKE2 configuration written to {{ rke2_config_dir }}/config.yaml"
