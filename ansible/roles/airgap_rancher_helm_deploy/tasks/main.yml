---
# Deploy Rancher to RKE2 cluster using Helm from bastion server
- name: Deploy Rancher to RKE2 cluster
  tags:
    - rancher
  block:
    - name: Check if kubectl is configured on bastion
      ansible.builtin.stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_file

    - name: Fail if kubectl is not configured
      ansible.builtin.fail:
        msg: "kubectl is not configured on bastion. Run setup-kubectl-access.yml first."
      when: not kubeconfig_file.stat.exists

    - name: Check Helm installation
      ansible.builtin.command: helm version --short
      register: helm_output_version
      ignore_errors: true

    - name: Display Helm version
      when: helm_output_version.rc == 0
      ansible.builtin.debug:
        msg: "Helm version: {{ helm_output_version.stdout }}"

    - name: Install Helm if not present
      when: helm_output_version.rc != 0
      block:
        - name: Download Helm tarball with SHA256 verification
          include_role:
            name: download_verify
          vars:
            dv_artifact_url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
            dv_checksum_url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz.sha256sum"
            dv_dest: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
            dv_checksum_format: "sha256sum_file"
            dv_retries: 3
            dv_delay: 30

        - name: Extract Helm binary
          ansible.builtin.unarchive:
            src: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
            dest: /tmp
            remote_src: true
            creates: /tmp/linux-amd64/helm

        - name: Install Helm binary
          become: true
          ansible.builtin.copy:
            src: /tmp/linux-amd64/helm
            dest: /usr/local/bin/helm
            mode: "0755"
            remote_src: true

        - name: Verify Helm installation
          ansible.builtin.command: helm version --short
          register: helm_version_output
          changed_when: false

        - name: Display Helm version
          ansible.builtin.debug:
            msg: "Helm version: {{ helm_version_output.stdout }}"

    - name: Preflight - verify Rancher image exists in private registry
      when:
        - rancher_system_default_registry | default('') | length > 0
        - rancher_image_tag | default('') | length > 0
        - rancher_preflight_verify_image | default(true) | bool
      block:
        - name: Resolve matching registry config for preflight
          ansible.builtin.set_fact:
            _rancher_preflight_cfg: >-
              {{
                (private_registry_configs | default([])
                  | selectattr('registry', 'equalto', rancher_system_default_registry)
                  | list
                  | first) | default({})
              }}

        - name: Compute preflight registry auth and TLS
          ansible.builtin.set_fact:
            _rancher_preflight_user: "{{ (_rancher_preflight_cfg.auth | default({})).username | default(omit) }}"
            _rancher_preflight_pass: "{{ (_rancher_preflight_cfg.auth | default({})).password | default(omit) }}"
            _rancher_preflight_have_creds: "{{ ((_rancher_preflight_cfg.auth | default({})).username | default('') | length > 0) }}"
            _rancher_preflight_validate_certs: >-
              {{ not ((_rancher_preflight_cfg.tls | default({})).insecure_skip_verify | default(false) | bool) }}

        - name: Default preflight method to api
          ansible.builtin.set_fact:
            _rancher_preflight_use_skopeo: false

        - name: Detect skopeo for pull mode
          ansible.builtin.command: skopeo --version
          register: _rancher_preflight_skopeo_ver
          changed_when: false
          failed_when: false
          when: rancher_preflight_mode | default('api') == 'pull'

        - name: Enable skopeo pull-check when available
          ansible.builtin.set_fact:
            _rancher_preflight_use_skopeo: "{{ _rancher_preflight_skopeo_ver.rc | default(1) == 0 }}"
          when: rancher_preflight_mode | default('api') == 'pull'

        - name: Warn when pull mode requested but skopeo is missing
          ansible.builtin.debug:
            msg: >-
              rancher_preflight_mode=pull but skopeo is not installed on the bastion; falling back to api mode.
              Note: api mode can return a false 404 against a cold Harbor proxy cache. Install skopeo to use pull mode.
          when:
            - rancher_preflight_mode | default('api') == 'pull'
            - not (_rancher_preflight_use_skopeo | bool)

        # --- API mode: registry v2 manifest GET (default; no extra deps) ---
        - name: Query Rancher image manifest in private registry
          ansible.builtin.uri:
            url: "https://{{ rancher_system_default_registry }}/v2/{{ rancher_preflight_image_repo }}/manifests/{{ rancher_image_tag }}"
            method: GET
            timeout: 20
            validate_certs: "{{ _rancher_preflight_validate_certs }}"
            url_username: "{{ _rancher_preflight_user }}"
            url_password: "{{ _rancher_preflight_pass }}"
            force_basic_auth: true
            headers:
              Accept: >-
                application/vnd.oci.image.manifest.v1+json,
                application/vnd.docker.distribution.manifest.v2+json,
                application/vnd.docker.distribution.manifest.list.v2+json
            status_code: [200, 401, 403, 404]
          register: _rancher_preflight_resp
          failed_when: false
          when: not (_rancher_preflight_use_skopeo | bool)

        - name: Confirm Rancher image found in private registry
          ansible.builtin.debug:
            msg: >-
              OK: {{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
              present in private registry (HTTP {{ _rancher_preflight_resp.status }}).
          when:
            - not (_rancher_preflight_use_skopeo | bool)
            - _rancher_preflight_resp.status | default(0) == 200

        - name: Warn if registry preflight could not confirm image
          ansible.builtin.debug:
            msg: >-
              WARNING: could not confirm {{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
              (HTTP {{ _rancher_preflight_resp.status | default('?') }}: {{ _rancher_preflight_resp.msg | default('') }}).
              If this is an auth/API issue, set rancher_preflight_verify_image: false to skip. Continuing install.
          when:
            - not (_rancher_preflight_use_skopeo | bool)
            - _rancher_preflight_resp.status | default(0) not in [200, 404]

        - name: Fail if Rancher image is missing from private registry
          ansible.builtin.fail:
            msg: >-
              Rancher image {{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
              is NOT present in the private registry (HTTP 404). Mirror it (and rancher/shell, plus the
              webhook/agent images Rancher deploys) into {{ rancher_system_default_registry }} before installing,
              or set rancher_preflight_verify_image: false to skip this check.
          when:
            - not (_rancher_preflight_use_skopeo | bool)
            - _rancher_preflight_resp.status | default(0) == 404

        # --- Pull mode: skopeo inspect (same path as a real pull; correct for proxies) ---
        - name: Pull-check Rancher image with skopeo
          ansible.builtin.command:
            cmd: >-
              skopeo inspect
              --tls-verify={{ _rancher_preflight_validate_certs | bool | lower }}
              {{ ('--creds=' ~ _rancher_preflight_user ~ ':' ~ _rancher_preflight_pass) if (_rancher_preflight_have_creds | bool) else '' }}
              docker://{{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
          register: _rancher_preflight_skopeo_resp
          changed_when: false
          failed_when: false
          when: _rancher_preflight_use_skopeo | bool

        - name: Confirm Rancher image resolvable via skopeo
          ansible.builtin.debug:
            msg: >-
              OK: {{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
              resolvable via skopeo (pull path verified).
          when:
            - _rancher_preflight_use_skopeo | bool
            - _rancher_preflight_skopeo_resp.rc | default(1) == 0

        - name: Fail if skopeo cannot resolve Rancher image
          ansible.builtin.fail:
            msg: >-
              Rancher image {{ rancher_system_default_registry }}/{{ rancher_preflight_image_repo }}:{{ rancher_image_tag }}
              could not be resolved via skopeo (rc={{ _rancher_preflight_skopeo_resp.rc }}):
              {{ _rancher_preflight_skopeo_resp.stderr | default(_rancher_preflight_skopeo_resp.stdout | default('')) }}
              Mirror it into {{ rancher_system_default_registry }} (or ensure the proxy-project path is correct and
              upstream is reachable), or set rancher_preflight_verify_image: false to skip.
          when:
            - _rancher_preflight_use_skopeo | bool
            - _rancher_preflight_skopeo_resp.rc | default(1) != 0

    - name: Add Rancher Helm repository
      kubernetes.core.helm_repository:
        name: "{{ rancher_helm_chart_repo_name }}"
        repo_url: "{{ rancher_helm_chart_repo_url }}"
      register: helm_repo_add
      until: helm_repo_add is success
      retries: 3
      delay: 10

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      register: helm_update
      until: helm_update.rc == 0
      retries: 3
      delay: 10
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Setup cert-manager
      when: rancher_tls_source == "letsEncrypt" or rancher_tls_source == "rancher"
      block:
        - name: Add jetstack Helm repository for cert-manager
          kubernetes.core.helm_repository:
            name: jetstack
            repo_url: "https://charts.jetstack.io"

        - name: Install cert-manager (verify signed charts)
          block:
            - name: Install cert-manager with chart verification
              kubernetes.core.helm:
                name: cert-manager
                chart_ref: jetstack/cert-manager
                chart_version: "{{ cert_manager_version | default(omit, true) }}"
                release_namespace: cert-manager
                create_namespace: true
                values:
                  installCRDs: true
                kubeconfig: "{{ kubeconfig_path }}"
                verify_ssl: true
          rescue:
            - name: Warn about unsigned cert-manager chart
              ansible.builtin.debug:
                msg: "WARNING: cert-manager chart has no signed provenance file. Installing without verification."

            - name: Install cert-manager (unsigned fallback)
              kubernetes.core.helm:
                name: cert-manager
                chart_ref: jetstack/cert-manager
                chart_version: "{{ cert_manager_version | default(omit, true) }}"
                release_namespace: cert-manager
                create_namespace: true
                values:
                  installCRDs: true
                kubeconfig: "{{ kubeconfig_path }}"

        - name: Wait for cert-manager to be ready
          kubernetes.core.k8s_info:
            api_version: apps/v1
            kind: Deployment
            name: cert-manager
            namespace: cert-manager
            kubeconfig: "{{ kubeconfig_path }}"
            wait_condition:
              type: Available
              status: "True"
            wait_timeout: 300

        - name: Wait for cert-manager pods to be Running
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Pod
            namespace: cert-manager
            kubeconfig: "{{ kubeconfig_path }}"
          register: cert_manager_pods
          until: cert_manager_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length >= 3
          retries: 12
          delay: 10

    - name: Install or Upgrade Rancher using Helm (verify signed charts)
      block:
        - name: Install Rancher with chart verification
          kubernetes.core.helm:
            name: rancher
            chart_ref: "{{ rancher_helm_chart_repo_name }}/rancher"
            chart_version: "{{ rancher_chart_version | default('') }}"
            release_namespace: "{{ rancher_namespace }}"
            create_namespace: true
            wait: true
            wait_timeout: 600s
            state: present
            kubeconfig: "{{ kubeconfig_path }}"
            values:
              hostname: "{{ rancher_private_hostname }}"
              bootstrapPassword: "{{ rancher_bootstrap_password }}"
              useBundledSystemChart: "{{ rancher_use_bundled_system_charts }}"
              rancherImageTag: "{{ rancher_image_tag | default(omit) }}"
              ingress:
                tls:
                  source: "{{ rancher_tls_source }}"
              global:
                cattle:
                  systemDefaultRegistry: "{{ rancher_system_default_registry }}"
            verify_ssl: true
      rescue:
        - name: Warn about unsigned Rancher chart
          ansible.builtin.debug:
            msg: "WARNING: Rancher chart has no signed provenance file. Installing without verification."

        - name: Install Rancher (unsigned fallback)
          kubernetes.core.helm:
            name: rancher
            chart_ref: "{{ rancher_helm_chart_repo_name }}/rancher"
            chart_version: "{{ rancher_chart_version | default('') }}"
            release_namespace: "{{ rancher_namespace }}"
            create_namespace: true
            wait: true
            wait_timeout: 600s
            state: present
            kubeconfig: "{{ kubeconfig_path }}"
            values:
              hostname: "{{ rancher_private_hostname }}"
              bootstrapPassword: "{{ rancher_bootstrap_password }}"
              useBundledSystemChart: "{{ rancher_use_bundled_system_charts }}"
              rancherImageTag: "{{ rancher_image_tag | default(omit) }}"
              ingress:
                tls:
                  source: "{{ rancher_tls_source }}"
              global:
                cattle:
                  systemDefaultRegistry: "{{ rancher_system_default_registry }}"

    - name: Wait for Rancher deployment to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: rancher
        namespace: "{{ rancher_namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 600

    - name: Get Rancher service information
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: rancher
        namespace: "{{ rancher_namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Display Rancher deployment status
      ansible.builtin.debug:
        msg: |
          Rancher has been successfully deployed!
          Namespace: {{ rancher_namespace }}
          Hostname: {{ rancher_private_hostname }}
          Access URL: https://{{ rancher_private_hostname }}
