---
# Default configuration for Rancher deployment via Helm

# Deployment control
install_helm: true

# Helm configuration
helm_version: "v3.12.3"

# Kubectl configuration
kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"

# Rancher configuration
rancher_namespace: "cattle-system"
rancher_helm_chart_repo_url: "https://releases.rancher.com/server-charts/latest"
rancher_helm_chart_repo_name: "rancher-latest"
rancher_bootstrap_password: "admin"
rancher_use_bundled_system_charts: true

# TLS configuration options: "rancher", "letsEncrypt", "secret"
rancher_tls_source: "rancher"

# Cert-manager chart version (SemVer without leading "v", e.g. 1.12.3). Leave empty to use latest.
cert_manager_version: ""

# Private registry configuration for airgap deployments.
# Set rancher_system_default_registry to your private registry URL (without scheme,
# e.g. "privateregistry.example.com:5000"). When non-empty it is passed to the Rancher
# Helm chart as global.cattle.systemDefaultRegistry so that Rancher system images
# (including the rancher/shell image used by kubectl jobs) resolve to the private
# registry at install time. Required for airgap; leave empty for internet-connected deploys.
rancher_system_default_registry: ""

# Preflight: verify the primary Rancher image is present in the private registry
# before installing (airgap). Auto-disabled when rancher_system_default_registry is
# empty; set to false to skip the check entirely.
rancher_preflight_verify_image: true
# Repository path of the primary Rancher image inside the private registry, WITHOUT
# the registry host. Override if your mirror uses a different path — notably for a
# Harbor pull-through PROXY cache the image lives under the proxy project namespace
# (e.g. "proxycache/rancher/rancher"), and global.cattle.systemDefaultRegistry should
# be prefixed with that project too, otherwise the check inspects the wrong path.
rancher_preflight_image_repo: "rancher/rancher"
# Verification method:
#   "api"  (default) v2 registry manifest GET. Fast, no extra deps. Can return a
#           false 404 against a cold Harbor proxy cache (manifest fetched on demand).
#   "pull" use `skopeo inspect` — the same resolution path a real pull takes.
#           Correct for regular registries and pull-through proxies (no cold-cache
#           false negatives). Requires skopeo on the bastion; if absent, warns and
#           falls back to "api".
rancher_preflight_mode: "api"

# Optional: Specify custom Rancher image repository
# rancher_image_repository: "privateregistry.qa.rancher.space/rancher/rancher"

# Advanced configuration
rancher_advanced_values: {}
  # Example advanced configuration:
  # global:
  #   cattle:
  #     psp:
  #       enabled: false
  # useBundledSystemChart: true
  # extraEnv:
  #   - name: CATTLE_TLS_MIN_VERSION
  #     value: "1.2"
