---
# Default configuration for Rancher deployment via Helm

# Deployment control
install_helm: true

# Helm configuration
helm_version: "v3.12.3"

# Kubectl configuration
kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"

# Rancher configuration
rancher_namespace: "cattle-system"
rancher_helm_chart_repo_url: "https://releases.rancher.com/server-charts/latest"
rancher_helm_chart_repo_name: "rancher-latest"
rancher_bootstrap_password: "admin"
rancher_use_bundled_system_charts: true

# TLS configuration options: "rancher", "letsEncrypt", "secret"
rancher_tls_source: "rancher"

# Cert-manager chart version (SemVer without leading "v", e.g. 1.12.3). Leave empty to use latest.
cert_manager_version: ""

# Private registry configuration for airgap deployments.
# Set rancher_system_default_registry to your private registry URL (without scheme,
# e.g. "privateregistry.example.com:5000", or "host/proxycache" for a Harbor pull-through
# proxy). When non-empty it is passed to the Rancher Helm chart as the TOP-LEVEL
# systemDefaultRegistry value, which the chart uses BOTH to build the server pod image
# (<systemDefaultRegistry>/<rancher_image_repository>:<tag>) AND to set
# CATTLE_SYSTEM_DEFAULT_REGISTRY so Rancher system images (including the rancher/shell
# image used by kubectl jobs) resolve to the private registry at install time. NOTE: the
# chart ignores global.cattle.systemDefaultRegistry for the server image — use the
# top-level value. Required for airgap; leave empty for internet-connected deploys.
rancher_system_default_registry: ""

# Preflight: verify the primary Rancher image is present in the private registry
# before installing (airgap). Auto-disabled when rancher_system_default_registry is
# empty; set to false to skip the check entirely.
rancher_preflight_verify_image: true
# The registry preflight checks <rancher_system_default_registry>/<rancher_image_repository>:<rancher_image_tag>
# — the exact image the chart pulls. For a Harbor pull-through PROXY cache, put the
# proxy project in rancher_system_default_registry (e.g. "host/proxycache") and keep
# rancher_image_repository as the bare repo (e.g. "rancher/rancher").
# Verification method:
#   "api"  (default) v2 registry manifest GET. Fast, no extra deps. Can return a
#           false 404 against a cold Harbor proxy cache (manifest fetched on demand).
#   "pull" use `skopeo inspect` — the same resolution path a real pull takes.
#           Correct for regular registries and pull-through proxies (no cold-cache
#           false negatives). Requires skopeo on the bastion; if absent, warns and
#           falls back to "api".
rancher_preflight_mode: "api"

# Rancher image repository (the chart's image.repository, WITHOUT the registry host).
# Defaults to "rancher/rancher", which is served by docker.io mirrors. RC charts default
# to "rancher/rc" — if your private registry can't serve that, set this to a repo it
# can (e.g. "rancher/rancher"). Also used by the registry preflight check.
rancher_image_repository: "rancher/rancher"

# Advanced configuration
rancher_advanced_values: {}
  # Example advanced configuration:
  # global:
  #   cattle:
  #     psp:
  #       enabled: false
  # useBundledSystemChart: true
  # extraEnv:
  #   - name: CATTLE_TLS_MIN_VERSION
  #     value: "1.2"
