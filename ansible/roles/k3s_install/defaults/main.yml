---
# K3s install role defaults

# GitHub release base URL for K3s binaries and checksums
k3s_github_release_url: "https://github.com/k3s-io/k3s/releases/download"

# K3s channel for version resolution (stable, latest, testing)
k3s_channel: "latest"

# K3s channel URL for resolving channel to version
k3s_channel_url: "https://update.k3s.io/v1-release/channels"

# Binary install directory
k3s_bin_dir: "/usr/local/bin"

# Systemd directory
k3s_systemd_dir: "/etc/systemd/system"
