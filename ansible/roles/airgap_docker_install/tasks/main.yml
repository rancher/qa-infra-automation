---
- name: Download Docker binary with SHA256 verification
  include_role:
    name: download_verify
  vars:
    dv_artifact_url: "https://download.docker.com/linux/static/stable/{{ ansible_architecture }}/docker-{{ docker_version }}.tgz"
    dv_checksum_url: "https://download.docker.com/linux/static/stable/{{ ansible_architecture }}/docker-{{ docker_version }}.tgz.sha256"
    dv_dest: "/tmp/docker-{{ docker_version }}.tgz"
    dv_checksum_format: "sha256sum_file"
    dv_mode: "0644"
    dv_timeout: 60

- name: Extract binaries
  ansible.builtin.command: tar xzvf /tmp/docker-{{ docker_version }}.tgz --directory=/tmp

- name: Move binaries to install directory and start daemon
  ansible.builtin.shell: |
    mv /tmp/docker/* {{ install_dir }}
    dockerd 2>&1 | logger -t docker
  become: true

- name: Check that docker was installed correctly
  ansible.builtin.command: docker run hello-world
  changed_when: false
