---
# Default variables for rke2_cluster role
# RKE2 internal paths (not intended to be overridden — hardcoded in tasks)

# Timeout for waiting for RKE2 to be ready (seconds)
rke2_wait_timeout: 300

# Interval for checking RKE2 status (seconds)
rke2_check_interval: 10

# Local destination for kubeconfig
rke2_kubeconfig_dest: "{{ playbook_dir }}/kubeconfig.yaml"

# Wait for cluster to be fully ready
rke2_wait_for_ready: true

# Number of retries for starting services
rke2_service_start_retries: 3

# Delay between service start retries (seconds)
rke2_service_start_delay: 10
